<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">Korean Knowledge Assistant RAG architecture</title>
  <desc id="desc">React, FastAPI, exact search, pgvector, reranker, LLM, SSE streaming으로 이어지는 한국어 RAG 검색 흐름</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="1280" height="460" rx="24" fill="url(#bg)"/>
  <circle cx="1114" cy="92" r="210" fill="#2563eb" opacity="0.12"/>
  <circle cx="116" cy="420" r="210" fill="#14b8a6" opacity="0.10"/>

  <text x="64" y="58" fill="#f8fafc" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="32" font-weight="760">Korean RAG Search Pipeline</text>
  <text x="64" y="90" fill="#94a3b8" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="16">정확 검색과 벡터 검색을 결합해 한국어 표준 용어 질문의 근거를 찾고 스트리밍 답변으로 반환합니다.</text>
  <rect x="64" y="116" width="1152" height="3" rx="1.5" fill="url(#line)"/>

  <g transform="translate(64 160)" filter="url(#shadow)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <g>
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#38bdf8"/>
      <text x="45" y="34" fill="#e0f2fe" font-size="17" font-weight="750">React</text>
      <text x="27" y="58" fill="#7dd3fc" font-size="13">질문 · 콘솔</text>
    </g>

    <g transform="translate(184 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#0d9488"/>
      <text x="43" y="34" fill="#ccfbf1" font-size="17" font-weight="750">FastAPI</text>
      <text x="30" y="58" fill="#5eead4" font-size="13">인증 · 라우팅</text>
    </g>

    <g transform="translate(368 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#64748b"/>
      <text x="28" y="34" fill="#e2e8f0" font-size="17" font-weight="750">Normalize</text>
      <text x="25" y="58" fill="#cbd5e1" font-size="13">질의 정규화</text>
    </g>

    <g transform="translate(552 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#f59e0b"/>
      <text x="29" y="34" fill="#fef3c7" font-size="17" font-weight="750">Exact</text>
      <text x="24" y="58" fill="#fde68a" font-size="13">용어 정확 검색</text>
    </g>

    <g transform="translate(736 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#2563eb"/>
      <text x="31" y="34" fill="#dbeafe" font-size="17" font-weight="750">pgvector</text>
      <text x="24" y="58" fill="#93c5fd" font-size="13">벡터 검색</text>
    </g>

    <g transform="translate(920 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#22c55e"/>
      <text x="36" y="34" fill="#dcfce7" font-size="17" font-weight="750">Rerank</text>
      <text x="24" y="58" fill="#86efac" font-size="13">근거 재정렬</text>
    </g>

    <g transform="translate(1104 0)">
      <rect width="144" height="78" rx="18" fill="#111827" stroke="#7c3aed"/>
      <text x="51" y="34" fill="#ede9fe" font-size="17" font-weight="750">LLM</text>
      <text x="27" y="58" fill="#c4b5fd" font-size="13">답변 생성</text>
    </g>

    <path d="M152 39 H176" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M336 39 H360" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M520 39 H544" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M704 39 H728" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M888 39 H912" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
    <path d="M1072 39 H1096" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrowHead)"/>
  </g>

  <g transform="translate(64 284)" font-family="Pretendard, Noto Sans KR, Apple SD Gothic Neo, sans-serif">
    <rect width="548" height="86" rx="18" fill="#0b1120" stroke="#1e293b"/>
    <text x="28" y="35" fill="#f8fafc" font-size="18" font-weight="740">Retrieval Strategy</text>
    <text x="28" y="62" fill="#cbd5e1" font-size="14">2~8자 부분 문자열 정확 검색 + pgvector 유사도 검색 + 리랭킹 결합</text>

    <rect x="604" width="548" height="86" rx="18" fill="#0b1120" stroke="#1e293b"/>
    <text x="632" y="35" fill="#f8fafc" font-size="18" font-weight="740">Operation Strategy</text>
    <text x="632" y="62" fill="#cbd5e1" font-size="14">SSE 스트리밍, 요청 로그, 런타임 모델 설정, 운영 콘솔 관리</text>
  </g>

  <g transform="translate(64 404)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <text fill="#38bdf8">quality signals</text>
    <text x="128" fill="#94a3b8">retrieval hit · rerank score · prompt context · streaming latency · user feedback</text>
  </g>
</svg>
